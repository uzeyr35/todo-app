<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #374151;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    li button.delete,
    li button.edit {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li button.delete {
      color: #d1d5db;
    }

    li button.delete:hover {
      color: #ef4444;
    }

    li button.edit {
      color: #d1d5db;
    }

    li button.edit:hover {
      color: #4f46e5;
    }

    li.editing span { display: none; }

    li .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .footer button {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.82rem;
      text-decoration: underline;
    }

    .footer button:hover {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul id="todoList"></ul>

    <div class="footer">
      <span id="remaining"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    let todos = JSON.parse(localStorage.getItem('todos') || '[]');
    let filter = 'all';

    const input = document.getElementById('todoInput');
    const list  = document.getElementById('todoList');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function save() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      todos.push({ id: Date.now(), text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (t) t.done = !t.done;
      save();
      render();
    }

    function remove(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<p class="empty">Görev yok.</p>';
      } else {
        list.innerHTML = visible.map(t => `
          <li class="${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span>${escape(t.text)}</span>
            <button class="edit" onclick="startEdit(${t.id})" title="Düzenle">&#9998;</button>
            <button class="delete" onclick="remove(${t.id})" title="Sil">&#10005;</button>
          </li>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('remaining').textContent =
        `${active} görev kaldı`;
    }

    function startEdit(id) {
      const li = [...document.querySelectorAll('#todoList li')].find(el => {
        const editBtn = el.querySelector('button.edit');
        return editBtn && editBtn.getAttribute('onclick') === `startEdit(${id})`;
      });
      if (!li) return;

      const t = todos.find(t => t.id === id);
      li.classList.add('editing');

      const editInput = document.createElement('input');
      editInput.className = 'edit-input';
      editInput.value = t.text;

      const span = li.querySelector('span');
      li.insertBefore(editInput, span.nextSibling);
      editInput.focus();
      editInput.select();

      const finish = () => {
        const newText = editInput.value.trim();
        if (newText) t.text = newText;
        save();
        render();
      };

      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') finish();
        if (e.key === 'Escape') render();
      });
      editInput.addEventListener('blur', finish);
    }

    function escape(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    render();
  </script>
</body>
</html>
