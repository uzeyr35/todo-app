<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo Uygulaması</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f46e5;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover {
      background: #4338ca;
    }

    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filters button {
      flex: 1;
      padding: 7px;
      border: 1.5px solid #e5e7eb;
      background: #fff;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      color: #6b7280;
      transition: all 0.2s;
    }

    .filters button.active {
      background: #4f46e5;
      border-color: #4f46e5;
      color: #fff;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f3f4f6;
    }

    li:last-child {
      border-bottom: none;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    li span {
      flex: 1;
      font-size: 0.95rem;
      color: #374151;
      word-break: break-word;
    }

    li.done span {
      text-decoration: line-through;
      color: #9ca3af;
    }

    li button.delete,
    li button.edit {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    li button.delete { color: #d1d5db; }
    li button.delete:hover { color: #ef4444; }
    li button.edit { color: #d1d5db; }
    li button.edit:hover { color: #4f46e5; }

    li.editing span { display: none; }

    li .edit-input {
      flex: 1;
      padding: 4px 8px;
      border: 1.5px solid #4f46e5;
      border-radius: 6px;
      font-size: 0.95rem;
      outline: none;
    }

    .empty {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .loading {
      text-align: center;
      color: #9ca3af;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.85rem;
      margin-bottom: 12px;
      display: none;
    }

    .footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .footer button {
      background: none;
      border: none;
      color: #9ca3af;
      cursor: pointer;
      font-size: 0.82rem;
      text-decoration: underline;
    }

    .footer button:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Yapılacaklar</h1>

    <div class="error-msg" id="errorMsg"></div>

    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
      <button onclick="addTodo()">Ekle</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">Tümü</button>
      <button onclick="setFilter('active', this)">Aktif</button>
      <button onclick="setFilter('done', this)">Tamamlanan</button>
    </div>

    <ul id="todoList"><p class="loading">Yükleniyor...</p></ul>

    <div class="footer">
      <span id="remaining"></span>
      <button onclick="clearDone()">Tamamlananları sil</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://nrbnoxonnipgelzccimq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5yYm5veG9ubmlwZ2VsemNjaW1xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5MzExMTYsImV4cCI6MjA4NDUwNzExNn0.dT1OjxEyqjlFiBgagXUDm7X9nMR1xYC5e8GSivvb7C8';

    const headers = {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    };

    let todos = [];
    let filter = 'all';

    const input   = document.getElementById('todoInput');
    const list    = document.getElementById('todoList');
    const errBox  = document.getElementById('errorMsg');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });

    function showError(msg) {
      errBox.textContent = msg;
      errBox.style.display = 'block';
      setTimeout(() => errBox.style.display = 'none', 4000);
    }

    async function api(path, method = 'GET', body = null, extra = {}) {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
        method,
        headers: { ...headers, ...extra },
        body: body ? JSON.stringify(body) : null
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || res.statusText);
      }
      return res.status === 204 ? null : res.json();
    }

    async function loadTodos() {
      try {
        todos = await api('todos?order=created_at.asc');
        render();
      } catch (e) {
        showError('Görevler yüklenemedi: ' + e.message);
      }
    }

    async function addTodo() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      try {
        const [created] = await api('todos', 'POST', { text, done: false });
        todos.push(created);
        render();
      } catch (e) {
        showError('Görev eklenemedi: ' + e.message);
      }
    }

    async function toggle(id) {
      const t = todos.find(t => t.id === id);
      if (!t) return;
      try {
        const [updated] = await api(`todos?id=eq.${id}`, 'PATCH', { done: !t.done });
        t.done = updated.done;
        render();
      } catch (e) {
        showError('Görev güncellenemedi: ' + e.message);
      }
    }

    async function remove(id) {
      try {
        await api(`todos?id=eq.${id}`, 'DELETE', null, { 'Prefer': 'return=minimal' });
        todos = todos.filter(t => t.id !== id);
        render();
      } catch (e) {
        showError('Görev silinemedi: ' + e.message);
      }
    }

    async function clearDone() {
      const doneIds = todos.filter(t => t.done).map(t => t.id);
      if (!doneIds.length) return;
      try {
        await api(`todos?id=in.(${doneIds.join(',')})`, 'DELETE', null, { 'Prefer': 'return=minimal' });
        todos = todos.filter(t => !t.done);
        render();
      } catch (e) {
        showError('Görevler silinemedi: ' + e.message);
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const visible = todos.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      if (visible.length === 0) {
        list.innerHTML = '<p class="empty">Görev yok.</p>';
      } else {
        list.innerHTML = visible.map(t => `
          <li class="${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
            <span>${esc(t.text)}</span>
            <button class="edit" onclick="startEdit(${t.id})" title="Düzenle">&#9998;</button>
            <button class="delete" onclick="remove(${t.id})" title="Sil">&#10005;</button>
          </li>
        `).join('');
      }

      const active = todos.filter(t => !t.done).length;
      document.getElementById('remaining').textContent = `${active} görev kaldı`;
    }

    function startEdit(id) {
      const li = [...document.querySelectorAll('#todoList li')].find(el => {
        const btn = el.querySelector('button.edit');
        return btn && btn.getAttribute('onclick') === `startEdit(${id})`;
      });
      if (!li) return;

      const t = todos.find(t => t.id === id);
      li.classList.add('editing');

      const editInput = document.createElement('input');
      editInput.className = 'edit-input';
      editInput.value = t.text;

      li.insertBefore(editInput, li.querySelector('span').nextSibling);
      editInput.focus();
      editInput.select();

      let saved = false;
      const finish = async () => {
        if (saved) return;
        saved = true;
        const newText = editInput.value.trim();
        if (newText && newText !== t.text) {
          try {
            const [updated] = await api(`todos?id=eq.${id}`, 'PATCH', { text: newText });
            t.text = updated.text;
          } catch (e) {
            showError('Görev güncellenemedi: ' + e.message);
          }
        }
        render();
      };

      editInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') finish();
        if (e.key === 'Escape') { saved = true; render(); }
      });
      editInput.addEventListener('blur', finish);
    }

    function esc(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadTodos();
  </script>
</body>
</html>
